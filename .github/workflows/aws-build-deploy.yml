name: AWS - ECR Push

on:
  push:
    branches:
      - main
      - bh-dev
  pull_request:
    branches:
      - main
      - bh-dev

env:
  BASE_IMAGE_NAME: telemetry-processor
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.PROCESSOR_ECR_REPOSITORY || vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref || github.ref_name }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:TELEMETRY-processor-latest
          platforms: linux/amd64
          build-args: |
            NODE_ENV=${{ vars.NODE_ENV || 'production' }}
            PORT=${{ vars.PORT || '3000' }}
            LOG_LEVEL=${{ vars.LOG_LEVEL || 'info' }}
            BATCH_SIZE=${{ vars.BATCH_SIZE || '500' }}
            CRON_SCHEDULE=${{ vars.CRON_SCHEDULE || '*/5 * * * *' }}
            LEADERBOARD_REFRESH_SCHEDULE=${{ vars.LEADERBOARD_REFRESH_SCHEDULE || '0 1 * * *' }}
            MV_REFRESH_SCHEDULE=${{ vars.MV_REFRESH_SCHEDULE || '*/15 * * * *' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image to ECR
        if: github.event_name == 'push'
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:TELEMETRY-processor-latest
